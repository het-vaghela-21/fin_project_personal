<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: Arial, sans-serif; }
</style>
</head>
<body>
<svg width="1060" height="740" xmlns="http://www.w3.org/2000/svg">
  <rect width="1060" height="740" fill="#fff"/>

  <!-- Title -->
  <text x="530" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#000">FinAI – Class Diagram</text>

  <!-- ===== User ===== -->
  <rect x="30" y="55" width="200" height="110" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="30" y="55" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">User</text>
  <line x1="30" y1="81" x2="230" y2="81" stroke="#000" stroke-width="1"/>
  <text x="40" y="97" font-size="11" fill="#000">uid, name, email: String</text>
  <text x="40" y="112" font-size="11" fill="#000">role: user | admin</text>
  <text x="40" y="127" font-size="11" fill="#000">provider: email | google</text>
  <line x1="30" y1="133" x2="230" y2="133" stroke="#000" stroke-width="1"/>
  <text x="40" y="148" font-size="11" fill="#555">login(), logout(), register()</text>

  <!-- ===== Transaction ===== -->
  <rect x="30" y="220" width="200" height="100" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="30" y="220" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Transaction</text>
  <line x1="30" y1="246" x2="230" y2="246" stroke="#000" stroke-width="1"/>
  <text x="40" y="262" font-size="11" fill="#000">userId: String</text>
  <text x="40" y="277" font-size="11" fill="#000">type: credit | debit</text>
  <text x="40" y="292" font-size="11" fill="#000">amount: Number</text>
  <text x="40" y="307" font-size="11" fill="#000">category, title, date</text>

  <!-- ===== Goal ===== -->
  <rect x="30" y="380" width="200" height="100" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="30" y="380" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="398" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Goal</text>
  <line x1="30" y1="406" x2="230" y2="406" stroke="#000" stroke-width="1"/>
  <text x="40" y="422" font-size="11" fill="#000">userId: String</text>
  <text x="40" y="437" font-size="11" fill="#000">title: String</text>
  <text x="40" y="452" font-size="11" fill="#000">targetAmount, currentAmount</text>
  <text x="40" y="467" font-size="11" fill="#000">createdAt: Date</text>

  <!-- ===== LoginEvent ===== -->
  <rect x="30" y="540" width="200" height="90" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="30" y="540" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="130" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">LoginEvent</text>
  <line x1="30" y1="566" x2="230" y2="566" stroke="#000" stroke-width="1"/>
  <text x="40" y="582" font-size="11" fill="#000">timestamp: Date</text>
  <text x="40" y="597" font-size="11" fill="#000">ip, city, country: String</text>
  <text x="40" y="612" font-size="11" fill="#000">device: String</text>
  <text x="130" y="625" text-anchor="middle" font-size="9.5" fill="#666">«embedded in User»</text>

  <!-- ===== AuthContext ===== -->
  <rect x="290" y="55" width="210" height="90" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="290" y="55" width="210" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="395" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">AuthContext</text>
  <line x1="290" y1="81" x2="500" y2="81" stroke="#000" stroke-width="1"/>
  <text x="300" y="97" font-size="11" fill="#000">currentUser: User | null</text>
  <text x="300" y="112" font-size="11" fill="#000">loading: Boolean</text>
  <line x1="290" y1="120" x2="500" y2="120" stroke="#000" stroke-width="1"/>
  <text x="300" y="136" font-size="11" fill="#555">handleAuth(), syncUser()</text>

  <!-- ===== DashboardProvider ===== -->
  <rect x="290" y="210" width="210" height="100" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="290" y="210" width="210" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="395" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">DashboardProvider</text>
  <line x1="290" y1="236" x2="500" y2="236" stroke="#000" stroke-width="1"/>
  <text x="300" y="252" font-size="11" fill="#000">transactions: Transaction[]</text>
  <text x="300" y="267" font-size="11" fill="#000">goals: Goal[]</text>
  <line x1="290" y1="275" x2="500" y2="275" stroke="#000" stroke-width="1"/>
  <text x="300" y="291" font-size="11" fill="#555">addTransaction()</text>
  <text x="300" y="305" font-size="11" fill="#555">addGoal(), deleteGoal()</text>

  <!-- ===== AIInsightsService ===== -->
  <rect x="290" y="380" width="210" height="100" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="290" y="380" width="210" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="395" y="398" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">AIInsightsService</text>
  <line x1="290" y1="406" x2="500" y2="406" stroke="#000" stroke-width="1"/>
  <text x="300" y="422" font-size="11" fill="#000">insights: Insight[]</text>
  <text x="300" y="437" font-size="11" fill="#000">healthScore: Number</text>
  <text x="300" y="452" font-size="11" fill="#000">cacheTTL: 24hr</text>
  <line x1="290" y1="460" x2="500" y2="460" stroke="#000" stroke-width="1"/>
  <text x="300" y="476" font-size="11" fill="#555">analyzeTransactions()</text>

  <!-- ===== ChatService ===== -->
  <rect x="290" y="540" width="210" height="70" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="290" y="540" width="210" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="395" y="558" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">ChatService</text>
  <line x1="290" y1="566" x2="500" y2="566" stroke="#000" stroke-width="1"/>
  <text x="300" y="582" font-size="11" fill="#000">messages: Message[]</text>
  <line x1="290" y1="590" x2="500" y2="590" stroke="#000" stroke-width="1"/>
  <text x="300" y="604" font-size="11" fill="#555">sendMessage(msg, txns)</text>

  <!-- ===== NewsService ===== -->
  <rect x="290" y="660" width="210" height="65" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="290" y="660" width="210" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="395" y="678" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">NewsService</text>
  <line x1="290" y1="686" x2="500" y2="686" stroke="#000" stroke-width="1"/>
  <text x="300" y="702" font-size="11" fill="#000">articles: NewsArticle[]</text>
  <line x1="290" y1="710" x2="500" y2="710" stroke="#000" stroke-width="1"/>
  <text x="300" y="721" font-size="11" fill="#555">fetchNews(query)</text>

  <!-- ===== External Services (right column) ===== -->
  <!-- Dashed boundary -->
  <rect x="560" y="55" width="475" height="470" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="797" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">«External Services»</text>

  <!-- FirebaseAuth -->
  <rect x="575" y="88" width="200" height="88" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="575" y="88" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="675" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">FirebaseAuth</text>
  <line x1="575" y1="114" x2="775" y2="114" stroke="#000" stroke-width="1"/>
  <text x="585" y="130" font-size="11" fill="#555">signInWithEmail()</text>
  <text x="585" y="145" font-size="11" fill="#555">signInWithGoogle()</text>
  <text x="585" y="160" font-size="11" fill="#555">sendPasswordReset()</text>

  <!-- GeminiAPI -->
  <rect x="575" y="220" width="200" height="88" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="575" y="220" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="675" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">GeminiAPI</text>
  <line x1="575" y1="246" x2="775" y2="246" stroke="#000" stroke-width="1"/>
  <text x="585" y="262" font-size="11" fill="#000">model: gemini-2.0-flash</text>
  <text x="585" y="277" font-size="11" fill="#000">fallback: gemini-1.5-flash</text>
  <line x1="575" y1="285" x2="775" y2="285" stroke="#000" stroke-width="1"/>
  <text x="585" y="300" font-size="11" fill="#555">generateContent(prompt)</text>

  <!-- GNewsAPI -->
  <rect x="575" y="352" width="200" height="70" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="575" y="352" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="675" y="370" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">GNewsAPI</text>
  <line x1="575" y1="378" x2="775" y2="378" stroke="#000" stroke-width="1"/>
  <text x="585" y="394" font-size="11" fill="#000">quota: 100 req/day</text>
  <line x1="575" y1="402" x2="775" y2="402" stroke="#000" stroke-width="1"/>
  <text x="585" y="414" font-size="11" fill="#555">fetchArticles(query)</text>

  <!-- MongoDB -->
  <rect x="575" y="466" width="200" height="48" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="575" y="466" width="200" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
  <text x="675" y="484" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">MongoDB (Atlas)</text>
  <text x="675" y="505" text-anchor="middle" font-size="11" fill="#000">stores: User, Transaction, Goal</text>

  <!-- ===== RELATIONSHIPS ===== -->

  <!-- User 1..* Transaction -->
  <line x1="130" y1="165" x2="130" y2="220" stroke="#000" stroke-width="1.3"/>
  <text x="136" y="198" font-size="10" fill="#000">1</text>
  <text x="136" y="216" font-size="10" fill="#000">0..*</text>

  <!-- User 1..* Goal -->
  <line x1="130" y1="320" x2="130" y2="380" stroke="#000" stroke-width="1.3"/>
  <text x="136" y="350" font-size="10" fill="#000">1</text>
  <text x="136" y="376" font-size="10" fill="#000">0..*</text>

  <!-- User 1..* LoginEvent -->
  <line x1="130" y1="480" x2="130" y2="540" stroke="#000" stroke-width="1.3"/>
  <text x="136" y="510" font-size="10" fill="#000">1</text>
  <text x="136" y="536" font-size="10" fill="#000">0..*</text>

  <!-- AuthContext → FirebaseAuth (dashed) -->
  <line x1="500" y1="100" x2="575" y2="132" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="530" y="108" font-size="10" fill="#000">«uses»</text>

  <!-- DashboardProvider → Transaction -->
  <line x1="290" y1="260" x2="230" y2="270" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="244" y="252" font-size="10" fill="#000">manages</text>

  <!-- DashboardProvider → Goal -->
  <line x1="290" y1="290" x2="230" y2="440" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- AIInsightsService → GeminiAPI -->
  <line x1="500" y1="428" x2="575" y2="264" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="518" y="360" font-size="10" fill="#000">«calls»</text>

  <!-- ChatService → GeminiAPI -->
  <line x1="500" y1="568" x2="575" y2="285" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- NewsService → GNewsAPI -->
  <line x1="500" y1="692" x2="575" y2="390" stroke="#000" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="524" y="556" font-size="10" fill="#000">«calls»</text>

  <!-- User/Transaction/Goal → MongoDB -->
  <line x1="230" y1="120" x2="575" y2="480" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="260" x2="575" y2="490" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="230" y1="430" x2="575" y2="500" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="630" text-anchor="middle" font-size="10" fill="#555">«stored in»</text>

  <!-- Footer -->
  <text x="530" y="728" text-anchor="middle" font-size="10" fill="#aaa">FinAI Project — Class Diagram Overview</text>
</svg>
</body>
</html>
