<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: Arial, sans-serif; }
</style>
</head>
<body>

  <line x1="36" y1="206" x2="88" y2="206" stroke="#000" stroke-width="1.8"/>
  <line x1="62" y1="228" x2="40" y2="256" stroke="#000" stroke-width="1.8"/>

  <!-- Registered User -->
  <circle cx="62" cy="400" r="16" fill="none" stroke="#000" stroke-width="1.8"/>

  <line x1="62" y1="634" x2="62" y2="668" stroke="#000" stroke-width="1.8"/>

  <text x="970" y="122" text-anchor="middle" font-size="9.5" fill="#555">«external»</text>

  <!-- Gemini AI -->

  <text x="970" y="392" text-anchor="middle" font-size="9.5" fill="#555">«external»</text>

  <ellipse cx="287" cy="347" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="287" cy="392" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="287" cy="437" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <!-- ========== GROUP: Financial Goals ========== -->
  <rect x="185" y="490" width="205" height="200" rx="3" fill="#fff" stroke="#888" stroke-width="1" stroke-dasharray="6,3"/>

  <ellipse cx="287" cy="534" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="287" cy="579" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="287" cy="624" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="287" cy="669" rx="82" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="522" cy="210" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <rect x="415" y="258" width="215" height="160" rx="3" fill="#fff" stroke="#888" stroke-width="1" stroke-dasharray="6,3"/>

  <ellipse cx="522" cy="347" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <ellipse cx="522" cy="392" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="522" y="396" text-anchor="middle" font-size="11" fill="#000">Search News</text>

  <!-- ========== GROUP: Admin Panel ========== -->
  <rect x="415" y="440" width="215" height="254" rx="3" fill="#fff" stroke="#888" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="522" y="457" text-anchor="middle" font-size="10.5" fill="#555">Admin Panel</text>
  <ellipse cx="522" cy="485" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="522" y="489" text-anchor="middle" font-size="11" fill="#000">Manage Users &amp; Roles</text>
  <ellipse cx="522" cy="532" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="522" y="536" text-anchor="middle" font-size="11" fill="#000">View All Transactions</text>
  <ellipse cx="522" cy="579" rx="88" ry="18" fill="#fff" stroke="#000" stroke-width="1.4"/>

  <line x1="78" y1="400" x2="428" y2="210" stroke="#000" stroke-width="1.1"/>

  <line x1="78" y1="400" x2="428" y2="347" stroke="#000" stroke-width="1.1"/>
  <line x1="78" y1="400" x2="428" y2="392" stroke="#000" stroke-width="1.1"/>

  <!-- Admin → Admin Panel -->
  <line x1="78" y1="618" x2="428" y2="485" stroke="#000" stroke-width="1.1"/>
  <line x1="78" y1="618" x2="428" y2="532" stroke="#000" stroke-width="1.1"/>
  <line x1="78" y1="618" x2="428" y2="579" stroke="#000" stroke-width="1.1"/>

  <!-- Auth use cases → Firebase (dashed) -->
  <line x1="369" y1="120" x2="900" y2="110" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <line x1="369" y1="165" x2="900" y2="110" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <text x="660" y="110" text-anchor="middle" font-size="9.5" fill="#555">«include»</text>

  <!-- AI use cases → Gemini -->
  <line x1="610" y1="120" x2="900" y2="380" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <line x1="610" y1="210" x2="900" y2="380" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <text x="782" y="298" text-anchor="middle" font-size="9.5" fill="#555">«include»</text>

  <!-- News use cases → GNews -->
  <line x1="610" y1="347" x2="900" y2="580" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <line x1="610" y1="392" x2="900" y2="580" stroke="#555" stroke-width="1.1" stroke-dasharray="5,3"/>
  <text x="782" y="500" text-anchor="middle" font-size="9.5" fill="#555">«include»</text>
